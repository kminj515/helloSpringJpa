<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>카테고리 목록</title>
</head>
<body>
<h1>카테고리 목록</h1>

<p th:if="${successMessage}" th:text="${successMessage}" style="color: green;"></p>
<p th:if="${errorMessage}" th:text="${errorMessage}" style="color: red;"></p>

<p>
  <a th:href="@{/categories/create}">+ 새 카테고리 등록</a>
</p>

<table border="1" cellpadding="10">
  <thead>
  <tr>
    <th>ID</th>
    <th>카테고리명</th>
    <th>작업</th>
  </tr>
  </thead>
  <tbody>
  <tr th:each="cat : ${categories}">
    <td th:text="${cat.id}"></td>
    <td th:text="${cat.name}"></td>
    <td>
      <form th:action="@{/categories/{id}/delete(id=${cat.id})}" method="post">
        <button type="submit">삭제</button>
      </form>
    </td>
  </tr>
  </tbody>
</table>

<div style="margin-top:40px; padding-top:15px; border-top:1px solid #ccc; font-size:14px; color:#555;">
  <p th:text="${'실습 수행 일시: ' + #temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm:ss')}"></p>
  <p>학번: 2371377 | 성명: 김민주</p>
</div>
</body>
</html>
