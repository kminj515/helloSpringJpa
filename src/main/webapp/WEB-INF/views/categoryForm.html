<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>카테고리 등록</title>
</head>
<body>
<h1>카테고리 등록</h1>

<form th:action="@{/categories/create}" th:object="${categoryForm}" method="post">
  <div>
    <label for="name">카테고리 이름</label>
    <input type="text" id="name" th:field="*{name}" placeholder="카테고리 이름">
    <span th:errors="*{name}" style="color:red;"></span>
  </div>

  <div style="margin-top:10px;">
    <button type="submit">등록</button>
    <a th:href="@{/categories}">목록으로</a>
  </div>
</form>

<div style="margin-top:40px; padding-top:15px; border-top:1px solid #ccc; font-size:14px; color:#555;">
  <p th:text="${'실습 수행 일시: ' + #temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm:ss')}"></p>
  <p>학번: 2371377 | 성명: 김민주</p>
</div>
</body>
</html>
